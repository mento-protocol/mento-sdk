name: Publish to npm

on: workflow_dispatch

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:unit

      - name: Determine npm tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q "beta"; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -q "rc"; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -q "alpha"; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION with tag: $(cat "$GITHUB_OUTPUT" | grep tag | cut -d= -f2)"

      - name: Publish
        run: npm publish --access public --tag ${{ steps.tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{secrets.SDK_NPM_AUTH_TOKEN}}
